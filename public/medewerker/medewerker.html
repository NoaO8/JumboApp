<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumbo — Medewerker</title>

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="medewerker.css">
    <style>:root {
    --jumbo-yellow: #FDC100;
    --jumbo-red: #E31C23;
    --jumbo-dark: #1A1A1A;
    --jumbo-gray: #F4F4F4;
}

body {
    font-family: 'DM Sans', sans-serif;
    background: var(--jumbo-gray);
    margin: 0;
}

.app {
    display: flex;
    min-height: 100vh;
}

/* Sidebar */
.nav_container {
    width: 240px;
    background: white;
    padding: 24px;
    box-shadow: 4px 0 20px rgba(0,0,0,0.05);
}

.nav_container h2 {
    font-family: 'Bebas Neue';
    letter-spacing: 1px;
}

.nav_container button {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #f4f4f4;
    cursor: pointer;
}

.nav_container button:hover {
    background: var(--jumbo-yellow);
}

/* Content */
.content {
    flex: 1;
    padding: 32px;
}

/* Header */
.header_container h1 {
    font-family: 'Bebas Neue';
    font-size: 2.2rem;
}

/* Cards */
.card {
    background: white;
    padding: 24px;
    border-radius: 16px;
    margin-top: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

/* Calendar buttons */
.inhoud_container button {
    margin: 4px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #eee;
    cursor: pointer;
}

.inhoud_container button:hover {
    background: var(--jumbo-yellow);
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-top: 12px;
}

.calendar-grid.header div {
    font-weight: 600;
    text-align: center;
    font-size: 0.8rem;
    color: #888;
}

.day-cell {
    background: #f4f4f4;
    border-radius: 10px;
    height: 70px;
    padding: 6px;
    cursor: pointer;
    transition: 0.2s;
}

.day-cell:hover {
    background: var(--jumbo-yellow);
}

.day-cell.active {
    background: var(--jumbo-yellow);
    box-shadow: 0 4px 14px rgba(253,193,0,0.4);
}

.day-number {
    font-size: 0.9rem;
    font-weight: 600;
}
/* ===== TIME PICKER CARD ===== */
.time-card {
    margin-top: 20px;
    background: white;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    max-width: 420px;
}

/* titel */
.time-card h3 {
    font-family: 'Bebas Neue';
    letter-spacing: 1px;
    margin-bottom: 6px;
}

.time-date {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 14px;
}

/* row met selects */
.time-row {
    display: flex;
    gap: 10px;
    margin: 12px 0;
}

.time-row select {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
    background: #f9f9f9;
}

/* buttons */
.primary-btn {
    width: 100%;
    padding: 12px;
    background: var(--jumbo-yellow);
    border: none;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
}

.primary-btn:hover {
    background: #e6b000;
}

.secondary-btn {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: none;
    border-radius: 10px;
    background: #eee;
    cursor: pointer;
}

/* flex button */
.flex-btn {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px dashed #ccc;
    background: #fafafa;
    cursor: pointer;
}

.flex-btn:hover {
    background: var(--jumbo-yellow);
}
</style>
</head>
<body>
    <main>
        <div class="app">
            <aside class="nav_container"></aside>

            <div class="content">
                <header class="header_container"></header>
                <div class="inhoud_container"></div>
                <div class="tijd_container"></div>
            </div>
        </div>
    </main>

    <script src="medewerker_script.js"></script>
</body>
</html>
