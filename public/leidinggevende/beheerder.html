<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>beheerder</title>
</head>
<body>
    <main>
        <section>
            <nav class="nav-beheerder">
                <button class="tab active" data-tab="planning">aanwezig</button>
                <button class="tab" data-tab="aanvragen">aanvraag<span class="badge">3</span></button>  <!--3 moet een variable worden-->
                <button class="tab" data-tab="berichten">berichten</button>
            </nav>
        </section>

        <section id="planning" class="tabview active">
            <div class="card-header">
              <h2>vrijdag 30 januari 2026</h2> <!--betere datum-->
              <span>5 studenten ingepland</span>
            </div>
            <div id="planningList"></div>
          </section>
       
          <section id="aanvragen" class="tabview">
            <h2>Shift aanvragen</h2>
            <div id="requestList"></div>
          </section>
       
          <section id="berichten" class="tabview">
            <div class="chat-container">
         
              <div class="chat-header">
                <select id="studentSelect">
                  <option value="">Selecteer een student om te chatten</option>
                  <option>Emma Jansen</option>
                  <option>Lars de Boer</option>
                  <option>Sophie Vermeer</option>
                  <option>Daan Bakker</option>
                  <option>Lisa Mulder</option>  <!--versichillende namen-->
                </select>
              </div>
         
              <div id="chatMessages" class="chat-messages">
                <div class="chat-placeholder">
                  Welkom bij Berichten<br>
                  <small>Selecteer een student om een gesprek te starten</small>
                </div>
              </div>
         
              <div class="chat-input">
                <input id="messageInput" type="text" placeholder="Typ een bericht…">
                <button id="sendMessage">➤</button>
              </div>
         
            </div>
          </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
