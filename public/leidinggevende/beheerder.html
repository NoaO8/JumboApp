<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beheerder</title>
    <link rel="styleheet" href="style.css">
    <style>
      .tabview {
    display: none;
    }
    .tabview.active {
        display: block;
    }


    </style>
</head>
<body>
    <main>
        <section>
            <nav class="nav-beheerder">
                <button class="tab active" data-tab="planning">Aanwezig</button>
                <button class="tab" data-tab="aanvragen">
                    Aanvraag <span class="badge" id="aanvraagBadge"></span>
                </button>
                <button class="tab" data-tab="berichten">Berichten</button>
            </nav>
        </section>

<!--Aanwezig-->
        <section id="planning" class="tabview active">
            <div class="card-header">
                <h2 id="currentDate"></h2>
                <span id="studentCount"></span>
            </div>
            <div id="planningList"></div>
        </section>

<!--Aanvragen-->
        <section id="aanvragen" class="tabview">
            <h2>Shift aanvragen</h2>
            <div id="requestList"></div>
        </section>

<!--Chatten-->
        <section id="berichten" class="tabview">
            <div class="chat-container">
                <div class="chat-header">
                    <label for="studentSelect" class="sr-only">Selecteer student</label>
                    <select id="studentSelect">
                        <option value="">Selecteer een student om te chatten</option>
                    </select>
                </div>

                <div id="chatMessages" class="chat-messages">
                    <div class="chat-placeholder">
                        Welkom bij Berichten<br>
                        <small>Selecteer een student om een gesprek te starten</small>
                    </div>
                </div>

                <div class="chat-input">
                    <label for="messageInput" class="sr-only">Bericht</label>
                    <input id="messageInput" type="text" placeholder="Typ een bericht…">
                    <button id="sendMessage" aria-label="Verstuur bericht">➤</button>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
