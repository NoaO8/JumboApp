<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumbo_inloggen</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="inlog_body">
    <main class="inlog_main">
        <div class="logo-bar">
            <div class="logo-badge">
                <!-- Simpel winkelwagen icoon -->
                <svg viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
            </div>
            <div class="logo-text">Jumbo<span>.</span></div>
        </div>

        <div class="card">
            <header>
                <div class="header_container">
                    <!-- h1 wordt ingevuld via JS -->
                </div>
            </header>

            <div class="inhoud_container">
                <!-- input + knop worden ingevuld via JS -->
            </div>

            <div class="error-msg" id="error-msg">
                Ongeldige geboortedatum. Probeer het opnieuw.
            </div>

            <div class="card-footer">
                Alleen toegankelijk voor Jumbo medewerkers
            </div>
        </div>
    </main>

</body>
<script src="inlog_script.js"></script>
</html>
